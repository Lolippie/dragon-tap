services:
  innkeeper:
    build: ./innkeeper-java
    container_name: innkeeper
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      NODE_ENV: production
    depends_on:
      cellar:
        condition: service_healthy
    networks:
      - dragontap-net

  cellar:
    image: postgres:16-alpine
    container_name: cellar
    environment: 
      POSTGRES_DB: ${POSTGRES_DB} 
      POSTGRES_USER: ${POSTGRES_USER} 
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD} 
    ports: 
      - "4183:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./cellar/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - dragontap-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dragontap -d dragontap"]
      interval: 10s
      timeout: 5s
      retries: 5
  board: 
    build: ./board-react
    container_name: board
    depends_on:
      - innkeeper
    networks:
      - dragontap-net
    restart: on-failure

  gatekeeper:
    image: nginx:alpine
    container_name: gatekeeper
    ports:
      - "80:80"
    volumes:
      - ./gatekeeper/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - board
      - innkeeper
    networks:
      - dragontap-net

volumes:
  pgdata:

networks:
  dragontap-net:
    driver: bridge

